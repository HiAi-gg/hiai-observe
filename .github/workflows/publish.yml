name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure npm auth
        working-directory: packages/hiai-observe
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc

      - name: Build package
        run: cd packages/hiai-observe && bun run build

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/hiai-observe
          # Skip cleanly only if this exact version is already published; fail on any other error.
          if bun publish --access public --no-git-checks; then
            echo "Published."
          else
            code=$?
            if npm view "@hiai-gg/hiai-observe@$(node -p "require('./package.json').version")" version >/dev/null 2>&1; then
              echo "::notice::Version already on npm — skipping."
            else
              echo "::error::npm publish failed (exit $code)"; exit $code
            fi
          fi

      # NOTE: GitHub Releases are created via `gh release create` (the org disables
      # write permissions for the workflow GITHUB_TOKEN). To automate them here,
      # enable org → Actions → Workflow permissions: read and write.

      - name: Clean up .npmrc
        if: always()
        run: rm -f packages/hiai-observe/.npmrc
