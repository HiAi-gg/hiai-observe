name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      # setup-node writes an .npmrc that authenticates via NODE_AUTH_TOKEN.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: cd packages/hiai-observe && bun run build

      - name: Publish to npm
        working-directory: packages/hiai-observe
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@hiai-gg/hiai-observe@${version}" version >/dev/null 2>&1; then
            echo "::notice::@hiai-gg/hiai-observe@${version} already on npm — skipping."
          else
            npm publish --access public --ignore-scripts
          fi
