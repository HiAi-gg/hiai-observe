name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: |
          for pkg in packages/hiai-client packages/mastra-exporter; do
            echo "Building $pkg..."
            (cd "$pkg" && bun run build) || true
          done

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for pkg in packages/hiai-client packages/mastra-exporter packages/hiai-mcp packages/hiai-cli; do
            if [ -f "$pkg/package.json" ]; then
              echo "Publishing $pkg..."
              (cd "$pkg" && bun publish --access public --provenance --no-git-checks) || {
                echo "::warning::Failed to publish $pkg - likely already published or missing scope"
              }
            fi
          done

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
