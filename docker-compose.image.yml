# HiAi Observe — Pre-built Image Variant
# Uses a pre-built Docker image instead of building from source.
# Startup is nearly instant since the image is already compiled.
#
# Usage (standalone — replicates all services):
#   docker compose -f docker-compose.image.yml up -d
#
# Usage (override — combine with main compose):
#   docker compose -f docker-compose.yml -f docker-compose.image.yml up -d
#
# The override mode is useful when you want to keep docker-compose.yml
# as the canonical definition while swapping `build: .` for a published image.
#
# Note: Set the same .env variables as docker-compose.yml requires.

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    mem_limit: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-observe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-observe}
      POSTGRES_DB: ${POSTGRES_DB:-hiai_observe}
    # Ports removed for production — access only via internal network.
    # For local development, uncomment:
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-observe} -d ${POSTGRES_DB:-hiai_observe}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    mem_limit: 256m
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-observe_local}"]
    # Ports removed for production — access only via internal network.
    # For local development, uncomment:
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    mem_limit: 64m
    environment:
      # Read-only access to Docker API
      CONTAINERS: 1
      EVENTS: 1
      SYSTEM: 1
      # Disable write operations
      POST: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      IMAGES: 0
      INFO: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      TASKS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run/proxy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2375/_ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    image: vgalibov/hiai-observe:latest
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_healthy
    ports:
      - "${PORT:-8001}:8001"
    volumes:
      - ./drizzle:/app/drizzle
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-observe}:${POSTGRES_PASSWORD:-observe}@postgres:5432/${POSTGRES_DB:-hiai_observe}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-observe_local}@redis:6379"
      PORT: ${PORT:-8001}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-false}
      HIAI_OBSERVE_API_KEY: ${HIAI_OBSERVE_API_KEY:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      # Connect to Docker via socket proxy (TCP) instead of direct socket mount
      DOCKER_HOST: "http://docker-socket-proxy:2375"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  pg_data:
  redis_data:
