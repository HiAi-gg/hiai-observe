# HiAi Observe — Production Docker Compose
# All configuration comes from .env file. Copy .env.example → .env first.
#
# Usage:
#   cp .env.example .env    # configure
#   docker compose up -d    # start
#   docker compose logs -f  # watch logs

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-observe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-observe}
      POSTGRES_DB: ${POSTGRES_DB:-hiai_observe}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-observe} -d ${POSTGRES_DB:-hiai_observe}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-8001}:8001"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-observe}:${POSTGRES_PASSWORD:-observe}@postgres:5432/${POSTGRES_DB:-hiai_observe}"
      REDIS_URL: "redis://redis:6379"
      PORT: ${PORT:-8001}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-false}
      HIAI_OBSERVE_API_KEY: ${HIAI_OBSERVE_API_KEY:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

volumes:
  pg_data:
  redis_data:
